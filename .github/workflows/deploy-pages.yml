name: Deploy Editor to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'examples/react/editor/**'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: examples/react/editor
        run: npm ci

      - name: Copy public assets
        run: cp public/LogoMin.png examples/react/editor/public/LogoMin.png

      - name: Build
        working-directory: examples/react/editor
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/react/editor/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
